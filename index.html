<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ophiuchus · AI</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      color: #fff;
      position: relative;
      overflow-x: hidden;
    }

    /* MAGIC UI BACKGROUND */
    .grid-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(140, 70, 255, 0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(140, 70, 255, 0.12) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
      animation: gridMove 15s linear infinite;
    }

    @keyframes gridMove {
      0% { background-position: 0 0; }
      100% { background-position: 50px 50px; }
    }

    .glow-circle {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 0;
      animation: floatGlow 12s infinite alternate;
    }

    .circle-1 {
      width: 500px;
      height: 500px;
      background: rgba(180, 70, 255, 0.2);
      top: -200px;
      left: -200px;
    }

    .circle-2 {
      width: 600px;
      height: 600px;
      background: rgba(100, 50, 200, 0.15);
      bottom: -250px;
      right: -250px;
    }

    @keyframes floatGlow {
      0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
      100% { transform: translate(50px, 30px) scale(1.3); opacity: 0.7; }
    }

    /* MAIN CONTAINER */
    #app {
      position: relative;
      z-index: 10;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ========== LOGIN SECTION ========== */
    #login-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .login-container {
      width: 100%;
      max-width: 1200px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .logo-section {
      text-align: center;
      color: white;
      max-width: 400px;
      animation: fadeInLeft 0.8s ease;
    }

    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .snake-logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 20px;
      position: relative;
    }

    .snake-glow {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(180,70,255,0.8) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(20px);
      animation: snakePulse 3s infinite alternate;
    }

    @keyframes snakePulse {
      0% { opacity: 0.3; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.3); }
    }

    .snake-icon {
      position: relative;
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #b84aff, #6b4aff);
      border-radius: 40% 60% 30% 70% / 50% 40% 60% 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      color: white;
      box-shadow: 0 0 50px rgba(180, 70, 255, 0.6);
      z-index: 2;
      animation: snakeWiggle 6s infinite ease-in-out;
    }

    @keyframes snakeWiggle {
      0%, 100% { border-radius: 40% 60% 30% 70% / 50% 40% 60% 50%; transform: rotate(5deg); }
      50% { border-radius: 60% 40% 50% 50% / 60% 40% 50% 50%; transform: rotate(0deg); }
    }

    .logo-section h1 {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #d0b0ff, #b06aff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .logo-section p {
      color: #b0b0d0;
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 30px;
    }

    .feature-item {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(180,70,255,0.1);
      border-radius: 30px;
      padding: 10px 15px;
      color: #b0b0d0;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .feature-item i {
      color: #a84aff;
    }

    /* FORM CARD */
    .form-card {
      background: rgba(18, 18, 26, 0.8);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(180, 70, 255, 0.2);
      border-radius: 40px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      animation: fadeInRight 0.8s ease;
    }

    @keyframes fadeInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .form-header {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(180,70,255,0.2);
      padding-bottom: 15px;
    }

    .form-header button {
      background: none;
      border: none;
      color: #9090b0;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      padding: 5px 15px;
      border-radius: 30px;
    }

    .form-header button.active {
      color: white;
      background: rgba(180,70,255,0.2);
    }

    .form-box {
      display: none;
    }

    .form-box.active {
      display: block;
    }

    .form-box h2 {
      font-size: 2rem;
      font-weight: 600;
      background: linear-gradient(135deg, #fff, #d0b0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 25px;
    }

    .input-group {
      margin-bottom: 20px;
      position: relative;
    }

    .input-group i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #606080;
    }

    .input-group input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(180, 70, 255, 0.2);
      border-radius: 40px;
      padding: 14px 20px 14px 45px;
      color: white;
      font-size: 0.95rem;
      outline: none;
    }

    .input-group input:focus {
      border-color: #a84aff;
    }

    .form-box button {
      width: 100%;
      background: linear-gradient(135deg, #b84aff, #6b4aff);
      border: none;
      color: white;
      padding: 14px;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      box-shadow: 0 10px 30px rgba(130,60,255,0.4);
    }

    .form-box button:hover {
      transform: translateY(-2px);
    }

    .form-footer {
      text-align: center;
      margin-top: 20px;
      color: #8080a0;
    }

    .form-footer a {
      color: #b06aff;
      text-decoration: none;
      cursor: pointer;
    }

    /* ========== CHAT SECTION ========== */
    #chat-section {
      flex: 1;
      display: none;
      flex-direction: column;
      height: 100vh;
      padding: 0 20px;
    }

    .chat-nav {
      padding: 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(180, 70, 255, 0.15);
    }

    .chat-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-logo i {
      font-size: 2rem;
      color: #a84aff;
    }

    .chat-logo span {
      font-size: 1.5rem;
      font-weight: 600;
      background: linear-gradient(135deg, #fff, #d0b0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .api-status {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .api-indicator {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(180, 70, 255, 0.4);
      color: #ffaa00;
      padding: 8px 15px;
      border-radius: 40px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .api-indicator.active {
      color: #00ffaa;
      border-color: #00ffaa;
    }

    .logout-btn {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(180, 70, 255, 0.4);
      color: white;
      padding: 8px 20px;
      border-radius: 40px;
      cursor: pointer;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 80%;
      padding: 12px 18px;
      border-radius: 20px;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .message.user {
      align-self: flex-end;
      background: #25253a;
      border-bottom-right-radius: 6px;
    }

    .message.bot {
      align-self: flex-start;
      background: rgba(25, 25, 38, 0.8);
      border: 1px solid rgba(150, 100, 220, 0.2);
      border-bottom-left-radius: 6px;
    }

    .timestamp {
      font-size: 0.6rem;
      color: #8080a8;
      margin-top: 4px;
      text-align: right;
    }

    /* INPUT AREA - TOOLS DI DALAM BAR */
    .input-area {
      padding: 16px 0 24px 0;
    }

    .input-wrapper {
      background: rgba(18, 18, 26, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(150, 100, 220, 0.25);
      border-radius: 60px;
      padding: 4px 4px 4px 20px;
      display: flex;
      align-items: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 14px 10px;
      color: white;
      font-size: 1rem;
      outline: none;
      min-width: 0;
    }

    #user-input::placeholder {
      color: #606080;
    }

    .input-actions {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .input-btn {
      background: transparent;
      border: none;
      color: #9090c0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .input-btn:hover {
      background: rgba(180, 70, 200, 0.15);
      color: #d0b0ff;
    }

    #send-btn {
      background: linear-gradient(135deg, #a84aff, #7b4aff);
      border: none;
      color: white;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
      margin-left: 2px;
      flex-shrink: 0;
    }

    #send-btn:hover {
      transform: scale(1.05);
    }

    /* Modal API Key */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background: #1a1a24;
      border: 1px solid rgba(180, 70, 255, 0.4);
      border-radius: 30px;
      padding: 30px;
      width: 90%;
      max-width: 400px;
    }

    .modal-content h2 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #fff, #d0b0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .modal-content p {
      color: #a0a0c0;
      margin-bottom: 20px;
    }

    .modal-content input {
      width: 100%;
      background: #252530;
      border: 1px solid #33334a;
      padding: 15px;
      border-radius: 40px;
      color: white;
      margin-bottom: 15px;
      outline: none;
    }

    .modal-content button {
      width: 100%;
      background: linear-gradient(135deg, #b84aff, #6b4aff);
      border: none;
      color: white;
      padding: 15px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .modal-close {
      background: transparent !important;
      border: 1px solid rgba(180,70,255,0.4) !important;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 5px;
      padding: 8px 0;
    }

    .typing span {
      width: 8px;
      height: 8px;
      background: #a0a0d0;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-8px); opacity: 1; }
    }

    @media (max-width: 500px) {
      .input-btn {
        width: 38px;
        height: 38px;
        font-size: 1rem;
      }
      
      #send-btn {
        width: 42px;
        height: 42px;
      }
    }
  </style>
</head>
<body>
  <div class="grid-background"></div>
  <div class="glow-circle circle-1"></div>
  <div class="glow-circle circle-2"></div>

  <div id="app">
    <!-- LOGIN SECTION -->
    <div id="login-section">
      <div class="login-container">
        <div class="logo-section">
          <div class="snake-logo">
            <div class="snake-glow"></div>
            <div class="snake-icon">
              <i class="fas fa-dragon"></i>
            </div>
          </div>
          <h1>Ophiuchus</h1>
          <p>Asisten AI dengan kekuatan tanpa batas</p>
          <div class="features">
            <div class="feature-item"><i class="fas fa-check-circle"></i> Multi-model AI</div>
            <div class="feature-item"><i class="fas fa-check-circle"></i> Voice Note</div>
            <div class="feature-item"><i class="fas fa-check-circle"></i> Image Upload</div>
            <div class="feature-item"><i class="fas fa-check-circle"></i> Respons Cepat</div>
          </div>
        </div>

        <div class="form-card">
          <div class="form-header">
            <button class="active" onclick="showLogin()">Login</button>
            <button onclick="showRegister()">Register</button>
          </div>

          <!-- LOGIN FORM -->
          <div id="login-form" class="form-box active">
            <h2>Selamat Datang</h2>
            <div class="input-group">
              <i class="fas fa-user"></i>
              <input type="text" id="login-username" placeholder="Username">
            </div>
            <div class="input-group">
              <i class="fas fa-lock"></i>
              <input type="password" id="login-password" placeholder="Password">
            </div>
            <button onclick="handleLogin()">Login</button>
            <div class="form-footer">
              Belum punya akun? <a onclick="showRegister()">Daftar</a>
            </div>
          </div>

          <!-- REGISTER FORM -->
          <div id="register-form" class="form-box">
            <h2>Buat Akun</h2>
            <div class="input-group">
              <i class="fas fa-user"></i>
              <input type="text" id="register-name" placeholder="Nama Lengkap">
            </div>
            <div class="input-group">
              <i class="fas fa-envelope"></i>
              <input type="email" id="register-email" placeholder="Email">
            </div>
            <div class="input-group">
              <i class="fas fa-lock"></i>
              <input type="password" id="register-password" placeholder="Password">
            </div>
            <button onclick="handleRegister()">Daftar</button>
            <div class="form-footer">
              Sudah punya akun? <a onclick="showLogin()">Login</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- CHAT SECTION -->
    <div id="chat-section">
      <div class="chat-nav">
        <div class="chat-logo">
          <i class="fas fa-dragon"></i>
          <span>Ophiuchus</span>
        </div>
        <div class="api-status">
          <div class="api-indicator" id="apiIndicator" onclick="openApiModal()">
            <i class="fas fa-key"></i> Set API Key
          </div>
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
      </div>
      
      <div id="chat-container"></div>
      
      <!-- INPUT AREA - TOOLS DI DALAM BAR -->
      <div class="input-area">
        <div class="input-wrapper">
          <input type="text" id="user-input" placeholder="Ketik pesan..." disabled>
          <div class="input-actions">
            <button class="input-btn" onclick="attachImage()"><i class="fas fa-image"></i></button>
            <button class="input-btn" onclick="recordAudio()"><i class="fas fa-microphone"></i></button>
            <button id="send-btn" onclick="sendMessage()" disabled><i class="fas fa-arrow-up"></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL API KEY -->
  <div class="modal" id="apiModal">
    <div class="modal-content">
      <h2>🔑 Masukkan API Key</h2>
      <p>Dapatkan API key gratis dari <a href="https://console.groq.com" target="_blank" style="color: #b06aff;">console.groq.com</a></p>
      <input type="password" id="apiKeyInput" placeholder="gsk_..." value="">
      <button onclick="saveApiKey()">Simpan & Mulai Chat</button>
      <button class="modal-close" onclick="closeApiModal()">Tutup</button>
    </div>
  </div>

  <script>
    // ==================== STATE ====================
    let apiKey = localStorage.getItem('groq_api_key') || '';
    let isTyping = false;

    // ==================== CEK API KEY ====================
    function checkApiKey() {
      const indicator = document.getElementById('apiIndicator');
      const input = document.getElementById('user-input');
      const sendBtn = document.getElementById('send-btn');
      
      if (apiKey) {
        indicator.innerHTML = '<i class="fas fa-check-circle"></i> API Key Active';
        indicator.classList.add('active');
        input.disabled = false;
        sendBtn.disabled = false;
      } else {
        indicator.innerHTML = '<i class="fas fa-key"></i> Set API Key';
        indicator.classList.remove('active');
        input.disabled = true;
        sendBtn.disabled = true;
      }
    }

    // ==================== MODAL API ====================
    window.openApiModal = function() {
      document.getElementById('apiModal').style.display = 'flex';
    };

    window.closeApiModal = function() {
      document.getElementById('apiModal').style.display = 'none';
    };

    window.saveApiKey = function() {
      const newKey = document.getElementById('apiKeyInput').value.trim();
      if (!newKey) {
        alert('API Key tidak boleh kosong');
        return;
      }
      if (!newKey.startsWith('gsk_')) {
        alert('API Key Groq harus dimulai dengan "gsk_"');
        return;
      }
      
      apiKey = newKey;
      localStorage.setItem('groq_api_key', apiKey);
      closeApiModal();
      checkApiKey();
      addMessage('API Key tersimpan! Silakan mulai chat.', false);
    };

    // ==================== FORM TOGGLE ====================
    window.showLogin = function() {
      document.getElementById('login-form').classList.add('active');
      document.getElementById('register-form').classList.remove('active');
      document.querySelectorAll('.form-header button')[0].classList.add('active');
      document.querySelectorAll('.form-header button')[1].classList.remove('active');
    };

    window.showRegister = function() {
      document.getElementById('register-form').classList.add('active');
      document.getElementById('login-form').classList.remove('active');
      document.querySelectorAll('.form-header button')[1].classList.add('active'
