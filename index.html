<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ophiuchus · AI · Login</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* RESET & GLOBAL */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-y: auto; /* BISA DI SCROLL! */
      padding: 20px 0;
    }

    /* MAGIC UI BACKGROUND */
    .grid-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(140, 70, 255, 0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(140, 70, 255, 0.12) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
      animation: gridMove 15s linear infinite;
    }

    @keyframes gridMove {
      0% { background-position: 0 0; }
      100% { background-position: 50px 50px; }
    }

    /* GLOW CIRCLES */
    .glow-circle {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 0;
      animation: floatGlow 12s infinite alternate;
    }

    .circle-1 {
      width: 500px;
      height: 500px;
      background: rgba(180, 70, 255, 0.2);
      top: -200px;
      left: -200px;
      animation: floatGlow 15s infinite alternate;
    }

    .circle-2 {
      width: 600px;
      height: 600px;
      background: rgba(100, 50, 200, 0.15);
      bottom: -250px;
      right: -250px;
      animation: floatGlow 18s infinite alternate-reverse;
    }

    .circle-3 {
      width: 400px;
      height: 400px;
      background: rgba(220, 100, 255, 0.1);
      top: 50%;
      left: 20%;
      filter: blur(120px);
      animation: floatGlow 20s infinite alternate;
    }

    @keyframes floatGlow {
      0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
      100% { transform: translate(50px, 30px) scale(1.3); opacity: 0.7; }
    }

    /* PARTICLES */
    .particle {
      position: fixed;
      background: rgba(180, 70, 255, 0.3);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: particleFloat 10s infinite linear;
    }

    @keyframes particleFloat {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
    }

    /* MAIN CONTAINER - BISA SCROLL */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 1200px;
      padding: 30px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      min-height: 100%; /* Biar konten muat */
    }

    /* LOGO SECTION */
    .logo-section {
      text-align: center;
      color: white;
      max-width: 400px;
      animation: fadeInLeft 0.8s ease;
    }

    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .snake-logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 20px;
      position: relative;
    }

    .snake-glow {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(180,70,255,0.8) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(20px);
      animation: snakePulse 3s infinite alternate;
    }

    @keyframes snakePulse {
      0% { opacity: 0.3; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.3); }
    }

    .snake-icon {
      position: relative;
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #b84aff, #6b4aff);
      border-radius: 40% 60% 30% 70% / 50% 40% 60% 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      color: white;
      box-shadow: 0 0 50px rgba(180, 70, 255, 0.6);
      z-index: 2;
      animation: snakeWiggle 6s infinite ease-in-out;
      border: 3px solid rgba(255,255,255,0.2);
    }

    @keyframes snakeWiggle {
      0%, 100% { border-radius: 40% 60% 30% 70% / 50% 40% 60% 50%; transform: rotate(5deg); }
      25% { border-radius: 50% 50% 40% 60% / 40% 50% 50% 60%; transform: rotate(15deg) scale(1.05); }
      50% { border-radius: 60% 40% 50% 50% / 60% 40% 50% 50%; transform: rotate(0deg); }
      75% { border-radius: 30% 70% 60% 40% / 50% 60% 40% 50%; transform: rotate(-5deg) scale(1.05); }
    }

    .logo-section h1 {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #d0b0ff, #b06aff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .logo-section p {
      color: #b0b0d0;
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    /* FEATURES LIST */
    .features {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 20px;
    }

    .feature-item {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(180,70,255,0.1);
      border-radius: 30px;
      padding: 10px 15px;
      color: #b0b0d0;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .feature-item i {
      color: #a84aff;
      font-size: 1rem;
    }

    /* FORM CARD */
    .form-card {
      background: rgba(18, 18, 26, 0.8);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(180, 70, 255, 0.2);
      border-radius: 40px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      animation: fadeInRight 0.8s ease;
      max-height: 600px;
      overflow-y: auto; /* FORM BISA DISCROLL KALAU KEPANJANGAN */
    }

    @keyframes fadeInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .form-header {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(180,70,255,0.2);
      padding-bottom: 15px;
      position: sticky;
      top: 0;
      background: rgba(18,18,26,0.9);
      backdrop-filter: blur(10px);
      z-index: 5;
    }

    .form-header button {
      background: none;
      border: none;
      color: #9090b0;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      padding: 5px 15px;
      border-radius: 30px;
    }

    .form-header button.active {
      color: white;
      background: rgba(180,70,255,0.2);
    }

    .form-box {
      display: none;
      animation: fadeIn 0.4s ease;
    }

    .form-box.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-box h2 {
      font-size: 2rem;
      font-weight: 600;
      background: linear-gradient(135deg, #fff, #d0b0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 25px;
    }

    .input-group {
      margin-bottom: 20px;
      position: relative;
    }

    .input-group i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #606080;
      font-size: 1.1rem;
    }

    .input-group input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(180, 70, 255, 0.2);
      border-radius: 40px;
      padding: 14px 20px 14px 45px;
      color: white;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s;
    }

    .input-group input:focus {
      border-color: #a84aff;
      box-shadow: 0 0 0 3px rgba(180,70,255,0.2);
    }

    .input-group input::placeholder {
      color: #505070;
    }

    .form-box button {
      width: 100%;
      background: linear-gradient(135deg, #b84aff, #6b4aff);
      border: none;
      color: white;
      padding: 14px;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
      box-shadow: 0 10px 30px rgba(130,60,255,0.4);
    }

    .form-box button:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(150,70,255,0.6);
    }

    .form-footer {
      text-align: center;
      margin-top: 20px;
      color: #8080a0;
    }

    .form-footer a {
      color: #b06aff;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
      cursor: pointer;
    }

    .form-footer a:hover {
      color: #d0b0ff;
      text-decoration: underline;
    }

    /* RESPONSIVE */
    @media (max-width: 800px) {
      .container {
        flex-direction: column;
        gap: 30px;
        padding: 20px;
      }
      
      .logo-section {
        max-width: 100%;
      }
      
      .snake-logo {
        width: 80px;
        height: 80px;
      }
      
      .snake-icon {
        width: 80px;
        height: 80px;
        font-size: 3rem;
      }
      
      .logo-section h1 {
        font-size: 2.5rem;
      }
      
      .form-card {
        max-height: 500px;
      }
    }

    /* CUSTOM SCROLLBAR */
    .form-card::-webkit-scrollbar {
      width: 6px;
    }
    .form-card::-webkit-scrollbar-track {
      background: #1c1c28;
      border-radius: 10px;
    }
    .form-card::-webkit-scrollbar-thumb {
      background: #a84aff;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <!-- MAGIC UI BACKGROUND -->
  <div class="grid-background"></div>
  <div class="glow-circle circle-1"></div>
  <div class="glow-circle circle-2"></div>
  <div class="glow-circle circle-3"></div>
  
  <!-- PARTICLES -->
  <div id="particles"></div>

  <div class="container">
    <!-- LOGO SECTION -->
    <div class="logo-section">
      <div class="snake-logo">
        <div class="snake-glow"></div>
        <div class="snake-icon">
          <i class="fas fa-dragon"></i>
        </div>
      </div>
      <h1>Ophiuchus</h1>
      <p>Asisten AI dengan kekuatan tanpa batas. Akses berbagai model AI premium dalam satu platform.</p>
      
      <div class="features">
        <div class="feature-item"><i class="fas fa-check-circle"></i> Multi-model AI</div>
        <div class="feature-item"><i class="fas fa-check-circle"></i> Voice Note</div>
        <div class="feature-item"><i class="fas fa-check-circle"></i> Image Upload</div>
        <div class="feature-item"><i class="fas fa-check-circle"></i> Respons Cepat</div>
        <div class="feature-item"><i class="fas fa-check-circle"></i> 1M+ Pengguna</div>
        <div class="feature-item"><i class="fas fa-check-circle"></i> 50+ Model</div>
      </div>
    </div>

    <!-- FORM CARD - BISA DI SCROLL -->
    <div class="form-card">
      <div class="form-header">
        <button class="active" onclick="showLogin()">Login</button>
        <button onclick="showRegister()">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="login-form" class="form-box active">
        <h2>Selamat Datang</h2>
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" id="login-username" placeholder="Username" required>
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="login-password" placeholder="Password" required>
        </div>
        <button onclick="handleLogin()">Login</button>
        <div class="form-footer">
          Belum punya akun? <a onclick="showRegister(); return false;">Daftar</a>
        </div>
      </div>

      <!-- REGISTER FORM -->
      <div id="register-form" class="form-box">
        <h2>Buat Akun</h2>
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" id="register-name" placeholder="Nama Lengkap" required>
        </div>
        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" id="register-email" placeholder="Email" required>
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="register-password" placeholder="Password" required>
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="register-confirm" placeholder="Konfirmasi Password" required>
        </div>
        <button onclick="handleRegister()">Daftar</button>
        <div class="form-footer">
          Sudah punya akun? <a onclick="showLogin(); return false;">Login</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ==================== CREATE PARTICLES ====================
    function createParticles() {
      const container = document.getElementById('particles');
      if (!container) return;
      
      for (let i = 0; i < 40; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.width = (2 + Math.random() * 4) + 'px';
        particle.style.height = particle.style.width;
        particle.style.animationDelay = Math.random() * 10 + 's';
        particle.style.animationDuration = (8 + Math.random() * 10) + 's';
        container.appendChild(particle);
      }
    }

    // ==================== FORM TOGGLE ====================
    window.showLogin = function() {
      document.getElementById('login-form').classList.add('active');
      document.getElementById('register-form').classList.remove('active');
      
      document.querySelectorAll('.form-header button')[0].classList.add('active');
      document.querySelectorAll('.form-header button')[1].classList.remove('active');
    };

    window.showRegister = function() {
      document.getElementById('register-form').classList.add('active');
      document.getElementById('login-form').classList.remove('active');
      
      document.querySelectorAll('.form-header button')[1].classList.add('active');
      document.querySelectorAll('.form-header button')[0].classList.remove('active');
    };

    // ==================== HANDLE LOGIN ====================
    window.handleLogin = function() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value.trim();
      
      if (!username || !password) {
        alert('Username dan password harus diisi!');
        return;
      }
      
      alert('Login berhasil! Selamat datang ' + username);
      // Redirect ke halaman utama (ganti dengan URL website AI Tuan)
      window.location.href = 'https://ophiuchus775.github.io/ophiuchus-ai/';
    };

    // ==================== HANDLE REGISTER ====================
    window.handleRegister = function() {
      const name = document.getElementById('register-name').value.trim();
      const email = document.getElementById('register-email').value.trim();
      const password = document.getElementById('register-password').value.trim();
      const confirm = document.getElementById('register-confirm').value.trim();
      
      if (!name || !email || !password || !confirm) {
        alert('Semua field harus diisi!');
        return;
      }
      
      if (!email.includes('@') || !email.includes('.')) {
        alert('Email tidak valid!');
        return;
      }
      
      if (password.length < 6) {
        alert('Password minimal 6 karakter!');
        return;
      }
      
      if (password !== confirm) {
        alert('Password dan konfirmasi password tidak cocok!');
        return;
      }
      
      alert('Registrasi berhasil! Silakan login.');
      showLogin();
      
      // Reset form
      document.getElementById('register-name').value = '';
      document.getElementById('register-email').value = '';
      document.getElementById('register-password').value = '';
      document.getElementById('register-confirm').value = '';
    };

    // ==================== INIT ====================
    createParticles();
  </script>
</body>
</html>
